<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="certGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bgGrad)" />

  <!-- Certificate document -->
  <rect x="26" y="20" width="76" height="88" rx="6" ry="6" fill="url(#certGrad)" />

  <!-- Certificate header bar -->
  <rect x="26" y="20" width="76" height="22" rx="6" ry="6" fill="url(#shieldGrad)" />
  <rect x="26" y="34" width="76" height="8" fill="url(#shieldGrad)" />

  <!-- Lines of text on cert -->
  <rect x="34" y="52" width="40" height="4" rx="2" fill="#90caf9" opacity="0.8" />
  <rect x="34" y="60" width="56" height="3" rx="1.5" fill="#b0bec5" opacity="0.7" />
  <rect x="34" y="66" width="48" height="3" rx="1.5" fill="#b0bec5" opacity="0.7" />
  <rect x="34" y="72" width="52" height="3" rx="1.5" fill="#b0bec5" opacity="0.7" />
  <rect x="34" y="78" width="44" height="3" rx="1.5" fill="#b0bec5" opacity="0.7" />

  <!-- Seal / badge circle -->
  <circle cx="82" cy="92" r="16" fill="#1565c0" />
  <circle cx="82" cy="92" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="3 2" />

  <!-- Checkmark inside seal -->
  <polyline points="75,92 80,97 90,85" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Header icon: small lock -->
  <rect x="59" y="24" width="10" height="7" rx="1.5" fill="#ffffff" opacity="0.95" />
  <path d="M61 24 Q61 20 64 20 Q67 20 67 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />
  <circle cx="64" cy="27.5" r="1.2" fill="#1565c0" />
</svg>
